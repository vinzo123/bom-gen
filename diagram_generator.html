<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Solution Diagram Generator</title>
  <style>
    :root {
      --bg: #f4f5f2;
      --panel: #ffffff;
      --ink: #1f2933;
      --muted: #5e6c77;
      --line: #d7ddd7;
      --green: #89cf45;
      --blue: #2f83d1;
      --teal: #18a99b;
      --brown: #8d826f;
      --red: #ad6266;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, sans-serif;
    }

    header {
      background: #111;
      color: #fff;
      padding: 16px 24px;
      border-bottom: 6px solid var(--green);
    }

    header h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 420px) 1fr;
      gap: 18px;
      padding: 18px;
      min-height: calc(100vh - 64px);
    }

    .controls,
    .preview {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .controls {
      padding: 16px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #cfd7cf;
      border-radius: 6px;
      padding: 10px 11px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }

    textarea {
      min-height: 138px;
      resize: vertical;
      line-height: 1.4;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 13px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: var(--ink);
      color: #fff;
    }

    button.secondary {
      background: #e6ece6;
      color: var(--ink);
      border: 1px solid #cfd7cf;
    }

    .preview {
      overflow: auto;
      padding: 12px;
    }

    #diagram {
      min-width: 960px;
    }

    svg {
      display: block;
      width: 100%;
      max-width: 1280px;
      height: auto;
      margin: 0 auto;
      background: white;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      #diagram {
        min-width: 720px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Solution Diagram Generator</h1>
  </header>

  <main class="layout">
    <section class="controls">
      <div class="field">
        <label for="projectTitle">Project Title</label>
        <input id="projectTitle" value="Despatch Sequence Management System" />
      </div>

      <div class="field">
        <label for="requirement">User Requirement</label>
        <textarea id="requirement">Customer requires a system for despatch sequence verification, vehicle mapping, mobile receiving, and real-time status updates.</textarea>
      </div>

      <div class="field">
        <label for="solution">Proposed Solution</label>
        <textarea id="solution">Web application with sequence engine, IIS, database, mail server integration, barcode scanning, mobile application, reports, and dashboard.</textarea>
      </div>

      <div class="actions">
        <button id="generateBtn">Generate Diagram</button>
        <button class="secondary" id="downloadSvgBtn">Download SVG</button>
      </div>
    </section>

    <section class="preview">
      <div id="diagram"></div>
    </section>
  </main>

  <script>
    const COLORS = {
      dark: "#4a5963",
      blue: "#2f83d1",
      teal: "#18a99b",
      brown: "#8d826f",
      red: "#ad6266"
    };

    function escapeXml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function titleCase(value) {
      return value
        .toLowerCase()
        .replace(/\b[a-z]/g, letter => letter.toUpperCase());
    }

    function compactText(value, fallback, maxLength = 42) {
      const cleaned = String(value || "")
        .replace(/[^A-Za-z0-9 /&()-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();

      if (!cleaned) return fallback;
      return cleaned.length > maxLength ? `${cleaned.slice(0, maxLength - 3)}...` : cleaned;
    }

    function hasAny(text, words) {
      return words.some(word => text.includes(word));
    }

    function detectDiagramData(title, requirement, solution) {
      const all = `${title} ${requirement} ${solution}`.toLowerCase();
      const projectTitle = compactText(title, "Client Solution", 48);

      let systemName = projectTitle;
      if (hasAny(all, ["bin"])) systemName = "Bin Management System";
      if (hasAny(all, ["inventory", "stock"])) systemName = "Inventory Management System";
      if (hasAny(all, ["invoice", "sales order", "soms"])) systemName = "Sales Order Management System";
      if (hasAny(all, ["traceability", "barcode"])) systemName = "Traceability Management System";
      if (hasAny(all, ["despatch", "dispatch", "sequence"])) systemName = "Despatch Sequence Management System";

      const outputs = [];

      if (hasAny(all, ["barcode", "scan", "scanner", "verification", "sequence"])) {
        outputs.push({
          group: "DSMS",
          label: "Despatch Sequence Verification",
          color: COLORS.red,
          icon: "scanner"
        });
      }

      if (hasAny(all, ["vehicle", "truck", "mapping", "dispatch", "despatch"])) {
        outputs.push({
          group: "DSMS",
          label: "Despatch Vehicle Mapping",
          color: COLORS.blue,
          icon: "truck"
        });
      }

      if (hasAny(all, ["mobile", "customer", "receiving", "trolley"])) {
        outputs.push({
          group: "DSMC",
          label: "Customer End Trolley Receiving",
          color: COLORS.teal,
          icon: "mobileTruck"
        });
      }

      if (hasAny(all, ["report", "dashboard", "status"])) {
        outputs.push({
          group: "REPORTS",
          label: "Dashboard And Reports",
          color: COLORS.blue,
          icon: "report"
        });
      }

      if (outputs.length === 0) {
        outputs.push(
          { group: "APP", label: "Data Entry And Validation", color: COLORS.red, icon: "scanner" },
          { group: "APP", label: "Transaction Processing", color: COLORS.blue, icon: "report" },
          { group: "APP", label: "Reports And Dashboard", color: COLORS.teal, icon: "mobileTruck" }
        );
      }

      return {
        projectTitle,
        systemName,
        serverParts: [
          hasAny(all, ["web", "dashboard", "application"]) ? "WEB APPLICATION" : "APPLICATION",
          hasAny(all, ["sequence"]) ? "SEQUENCE ENGINE" : "BUSINESS ENGINE",
          hasAny(all, ["iis"]) ? "IIS" : "SERVICE LAYER",
          "DATA BASE"
        ],
        leftSystem: hasAny(all, ["mail", "email"]) ? "MAIL SERVER" : "CLIENT INPUT",
        outputs: outputs.slice(0, 4)
      };
    }

    function iconSvg(icon, x, y) {
      if (icon === "truck") {
        return `
          <rect x="${x}" y="${y + 20}" width="110" height="58" fill="#b88b63"/>
          <rect x="${x - 34}" y="${y + 38}" width="48" height="42" fill="#0e4342"/>
          <circle cx="${x - 16}" cy="${y + 85}" r="8" fill="#111"/>
          <circle cx="${x + 72}" cy="${y + 85}" r="8" fill="#111"/>
          <line x1="${x - 36}" y1="${y + 85}" x2="${x + 124}" y2="${y + 85}" stroke="#333" stroke-width="3"/>
        `;
      }

      if (icon === "mobileTruck") {
        return `
          <rect x="${x}" y="${y}" width="32" height="58" rx="4" fill="#45687a"/>
          <rect x="${x + 5}" y="${y + 8}" width="22" height="38" fill="#eff7f7"/>
          <circle cx="${x + 16}" cy="${y + 29}" r="8" fill="#26b99a"/>
          <path d="M${x + 12} ${y + 28} l4 5 l8 -10" fill="none" stroke="#fff" stroke-width="3"/>
          <rect x="${x + 138}" y="${y + 22}" width="82" height="62" fill="#e7282c"/>
          <path d="M${x + 220} ${y + 22} l34 20 v42 l-34 -18 z" fill="#d6dce2"/>
          <circle cx="${x + 208}" cy="${y + 90}" r="8" fill="#333"/>
          <circle cx="${x + 240}" cy="${y + 90}" r="8" fill="#333"/>
        `;
      }

      if (icon === "report") {
        return `
          <rect x="${x}" y="${y}" width="88" height="100" fill="#edf1f2" stroke="#bcc7cb"/>
          <line x1="${x + 16}" y1="${y + 25}" x2="${x + 72}" y2="${y + 25}" stroke="#8fa1aa" stroke-width="4"/>
          <rect x="${x + 16}" y="${y + 44}" width="18" height="34" fill="#2f83d1"/>
          <rect x="${x + 41}" y="${y + 34}" width="18" height="44" fill="#18a99b"/>
          <rect x="${x + 66}" y="${y + 55}" width="18" height="23" fill="#89cf45"/>
        `;
      }

      return `
        <path d="M${x} ${y + 28} l47 -10 l8 34 l-47 10 z" fill="#111"/>
        <path d="M${x + 16} ${y + 74} h44 v18 h-44 z" fill="#111"/>
        <path d="M${x + 15} ${y + 52} q-12 -10 -7 -22" fill="none" stroke="#111" stroke-width="3"/>
        <rect x="${x + 88}" y="${y}" width="44" height="78" fill="#edf1f2" stroke="#bcc7cb"/>
        <path d="M${x + 148} ${y + 3} h32 v80 h-32 z" fill="#111"/>
      `;
    }

    function outputRows(outputs) {
      const positions = [
        { y: 208, arrow: COLORS.brown, marker: "arrowBrown" },
        { y: 378, arrow: COLORS.blue, marker: "arrowBlue" },
        { y: 512, arrow: COLORS.teal, marker: "arrowTeal" },
        { y: 292, arrow: COLORS.blue, marker: "arrowBlue" }
      ];

      return outputs.map((item, index) => {
        const pos = positions[index] || positions[1];
        const start = index === 0
          ? `<path d="M557 376 H620 Q635 376 635 360 V${pos.y + 10} Q635 ${pos.y - 5} 650 ${pos.y - 5} H790" fill="none" stroke="${pos.arrow}" stroke-width="4" marker-end="url(#${pos.marker})"/>`
          : index === 2
            ? `<path d="M557 421 H620 Q635 421 635 436 V${pos.y + 2} Q635 ${pos.y + 16} 650 ${pos.y + 16} H812" fill="none" stroke="${pos.arrow}" stroke-width="4" marker-end="url(#${pos.marker})"/>`
            : `<line x1="557" y1="${pos.y + 20}" x2="800" y2="${pos.y + 20}" stroke="${pos.arrow}" stroke-width="4" marker-end="url(#${pos.marker})"/>`;

        return `
          ${start}
          <text x="890" y="${pos.y - 20}" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="${item.color}">${escapeXml(item.group)}</text>
          <text x="822" y="${pos.y + 12}" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="${item.color}">${escapeXml(titleCase(item.label))}</text>
          ${iconSvg(item.icon, 982, pos.y - 70)}
        `;
      }).join("");
    }

    function buildSvg(data) {
      return `<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#9aa4ad" flood-opacity="0.45"/>
          </filter>
          <marker id="arrowDark" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#4a5963"/></marker>
          <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2f83d1"/></marker>
          <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#18a99b"/></marker>
          <marker id="arrowBrown" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#8d826f"/></marker>
        </defs>

        <rect width="1280" height="720" fill="#f8f8f6"/>
        <path d="M0 0 H410 L520 32 H1280 V0 Z" fill="#111"/>
        <path d="M0 0 H390 L520 32 H0 Z" fill="#92d34d"/>
        <path d="M0 654 H750 L930 720 H0 Z" fill="#92d34d"/>
        <path d="M750 654 H1280 V720 H930 Z" fill="#111"/>

        <text x="640" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700">SOLUTION ILLUSTRATION</text>
        <rect x="70" y="105" width="1140" height="480" fill="#fff" stroke="#111" stroke-width="1.4"/>

        <rect x="78" y="365" width="150" height="66" rx="4" fill="#d5e0e8" filter="url(#shadow)"/>
        <text x="153" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#2f3d49">${escapeXml(data.leftSystem)}</text>

        <rect x="360" y="250" width="190" height="286" rx="4" fill="#cbd8e2" filter="url(#shadow)"/>
        <text x="455" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#263746">SERVER</text>
        <text x="373" y="284" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#263746">${escapeXml(data.systemName.split(" ").slice(0, 2).join(" "))}</text>
        <text x="373" y="306" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#263746">${escapeXml(data.systemName.split(" ").slice(2).join(" ") || "SYSTEM")}</text>
        <text x="455" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#263746">${escapeXml(data.serverParts[0])}</text>
        <line x1="366" y1="376" x2="544" y2="376" stroke="#4e6574" stroke-width="4" stroke-dasharray="12 10"/>
        <text x="455" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#263746">${escapeXml(data.serverParts[1])}</text>
        <line x1="366" y1="420" x2="544" y2="420" stroke="#4e6574" stroke-width="4" stroke-dasharray="12 10"/>
        <circle cx="455" cy="462" r="25" fill="#4aa564"/>
        <text x="455" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#fff">DB</text>
        <text x="455" y="498" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#263746">${escapeXml(data.serverParts[2])}</text>
        <text x="455" y="521" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#263746">${escapeXml(data.serverParts[3])}</text>

        <line x1="238" y1="374" x2="350" y2="374" stroke="#4a5963" stroke-width="4" marker-end="url(#arrowDark)"/>
        <line x1="350" y1="418" x2="238" y2="418" stroke="#4a5963" stroke-width="4" marker-end="url(#arrowDark)"/>

        ${outputRows(data.outputs)}

        <text x="85" y="687" font-family="Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="12">ECOSOFT ZOLUTIONS PVT LTD</text>
        <text x="85" y="707" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="10">Formerly Known as HNS INFOTECH PVT LTD</text>
      </svg>`;
    }

    function generateDiagram() {
      const data = detectDiagramData(
        document.getElementById("projectTitle").value,
        document.getElementById("requirement").value,
        document.getElementById("solution").value
      );

      document.getElementById("diagram").innerHTML = buildSvg(data);
    }

    function downloadSvg() {
      const svg = document.querySelector("#diagram svg");
      if (!svg) return;

      const blob = new Blob([svg.outerHTML], { type: "image/svg+xml" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "solution_illustration.svg";
      link.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById("generateBtn").addEventListener("click", generateDiagram);
    document.getElementById("downloadSvgBtn").addEventListener("click", downloadSvg);
    generateDiagram();
  </script>
</body>
</html>
